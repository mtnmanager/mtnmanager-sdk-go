openapi: 3.1.0
info:
  contact:
    email: support@mtnmanager.com
    name: MtnManager Support
    url: https://mtnmanager.com
  description: "The MtnManager API provides real-time access to your ski resort’s\
    \ public operational data. Use it to display current conditions on your website,\
    \ mobile app, or digital signage."
  license:
    name: MIT
  termsOfService: https://mtnmanager.com/terms
  title: MtnManager API
  version: 1.0.0
servers:
- url: "https://{subdomain}.mtnmanager.com"
  variables:
    subdomain:
      default: your-resort
      description: Your resort's unique subdomain
