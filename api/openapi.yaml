      - lang: typescript
        label: TypeScript
        source: "import { MtnManagerApi, Configuration } from \"@mtnmanager/sdk\"\
          ;\n\nconst api = new MtnManagerApi(\n\tnew Configuration({\n\t\tbasePath:\
          \ \"https://your-resort.mtnmanager.com\",\n\t})\n);\n\ntry {\n    const\
          \ data = await api.getFullReport();\n    console.log(data);\n} catch (error)\
          \ {\n    console.error(error);\n}"
      - lang: go
        label: Go
        source: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\tmtnmanager\
          \ \"github.com/mtnmanager/mtnmanager-sdk-go\"\n)\n\nfunc main() {\n\tconfiguration\
          \ := mtnmanager.NewConfiguration()\n\tconfiguration.Servers = mtnmanager.ServerConfigurations{\n\
          \t\t{URL: \"https://your-resort.mtnmanager.com\"},\n\t}\n\tclient := mtnmanager.NewAPIClient(configuration)\n\
          \n\tdata, _, err := client.MtnManagerAPI.GetFullReport(context.Background()).Execute()\n\
          \tif err != nil {\n\t\tpanic(err)\n\t}\n\tfmt.Printf(\"%+v\\n\", data)\n\
          }"
      - lang: php
        label: PHP
        source: |-
          <?php
          require_once(__DIR__ . '/vendor/autoload.php');

          $config = MtnManager\Configuration::getDefaultConfiguration()
              ->setHost('https://your-resort.mtnmanager.com');

          $apiInstance = new MtnManager\Api\MtnManagerApi(
              new GuzzleHttp\Client(),
              $config
          );

          try {
              $result = $apiInstance->getFullReport();
              print_r($result);
          } catch (Exception $e) {
              echo 'Exception: ', $e->getMessage(), PHP_EOL;
          }
      - lang: swift
        label: Swift
        source: |-
          import MtnManagerSDK

          let config = MtnManagerSDKAPIConfiguration(
              basePath: "https://your-resort.mtnmanager.com"
          )

          do {
              let data = try await MtnManagerAPI.getFullReport(apiConfiguration: config)
              print(data)
          } catch {
              print("Error: \(error)")
          }
