      description: |-
        Recurring schedule pattern with human-readable and machine-readable formats.

         Describes a regular operating schedule (e.g., "Weekends 10am-4pm") with
         both formatted strings for display and structured data for programmatic use.
      example:
        days_of_week:
        - Sunday
        - Sunday
        opens_at: opens_at
        in_effect: true
        days_string: days_string
        effective_to: 2000-01-23
        effective_string: effective_string
        time_string: time_string
        closes_at: closes_at
        effective_from: 2000-01-23
      properties:
        days_string:
          description: |-
            Human-readable description of which days this schedule applies to.
             Examples: "Daily", "Saturday & Sunday", "Monday, Wednesday, and Friday"
          type: string
        days_of_week:
          description: |-
            Array of days of the week this schedule applies to.
             For programmatic use.
          items:
            $ref: "#/components/schemas/DayOfWeek"
          type: array
        time_string:
          description: |-
            Human-readable time range.
             Example: "9:00 a.m. to 4:00 p.m."
          type: string
        opens_at:
          description: "Opening time in 24-hour format (HH:MM), in resort's local\
            \ timezone."
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          type: string
        closes_at:
          description: "Closing time in 24-hour format (HH:MM), in resort's local\
            \ timezone."
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          type: string
